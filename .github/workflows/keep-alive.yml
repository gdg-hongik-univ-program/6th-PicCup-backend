name: Keep Render Backend Alive

on:
  schedule:
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 0-16 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Ping Health API
        run: curl -sS -f --max-time 90 --retry 3 --retry-delay 15 --retry-all-errors -w '\nHTTP %{http_code} / %{time_total}s\n'